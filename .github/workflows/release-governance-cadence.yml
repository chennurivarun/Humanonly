name: Release Governance Cadence

on:
  workflow_dispatch:
    inputs:
      human_approval_ref:
        description: "Change ticket / approval reference used in governance evidence"
        required: false
        type: string
      simulated_latency_ms:
        description: "Simulated managed-network RTT latency (ms)"
        required: false
        default: "12"
        type: string
      target_profile:
        description: "Cadence target profile"
        required: false
        default: "ephemeral"
        type: choice
        options:
          - ephemeral
          - managed
      postgres_url:
        description: "Managed PostgreSQL URL override (optional; otherwise uses repo secret HUMANONLY_MANAGED_POSTGRES_URL)"
        required: false
        type: string
  schedule:
    - cron: "30 3 * * 3"

jobs:
  release-governance-cadence:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: humanonly
          POSTGRES_PASSWORD: humanonly
          POSTGRES_DB: humanonly_release
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U humanonly -d humanonly_release"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      NEXT_TELEMETRY_DISABLED: "1"
      HUMANONLY_APPROVAL_REF: ${{ github.event.inputs.human_approval_ref || format('AUTO-CADENCE-{0}', github.run_id) }}
      HUMANONLY_SIMULATED_LATENCY_MS: ${{ github.event.inputs.simulated_latency_ms || '12' }}
      HUMANONLY_RELEASE_TARGET_PROFILE: ${{ github.event.inputs.target_profile || 'ephemeral' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve cadence PostgreSQL target
        id: postgres-target
        env:
          INPUT_POSTGRES_URL: ${{ github.event.inputs.postgres_url }}
          SECRET_POSTGRES_URL: ${{ secrets.HUMANONLY_MANAGED_POSTGRES_URL }}
        run: |
          PROFILE="${HUMANONLY_RELEASE_TARGET_PROFILE}"
          if [ "$PROFILE" = "managed" ]; then
            TARGET_URL="${INPUT_POSTGRES_URL}"
            TARGET_SOURCE="workflow-input"
            if [ -z "$TARGET_URL" ]; then
              TARGET_URL="${SECRET_POSTGRES_URL}"
              TARGET_SOURCE="repo-secret"
            fi
            if [ -z "$TARGET_URL" ]; then
              echo "Managed profile selected but no postgres URL supplied via input or HUMANONLY_MANAGED_POSTGRES_URL secret."
              exit 1
            fi
          else
            TARGET_URL="postgresql://humanonly:humanonly@localhost:5432/humanonly_release"
            TARGET_SOURCE="ephemeral-default"
          fi

          echo "::add-mask::$TARGET_URL"
          echo "resolved_url=$TARGET_URL" >> "$GITHUB_OUTPUT"
          echo "resolved_source=$TARGET_SOURCE" >> "$GITHUB_OUTPUT"

      - name: Seed baseline SQLite snapshot
        run: npm run seed

      - name: Generate governed cutover plan evidence
        run: |
          npm run db:cutover:postgres -- --action=plan \
            --postgres-url="${{ steps.postgres-target.outputs.resolved_url }}" \
            --output=../../.tmp/release-cadence/cutover-plan.json

      - name: Apply governed cutover
        run: |
          npm run db:cutover:postgres -- --action=apply --execute \
            --human-approval-ref="$HUMANONLY_APPROVAL_REF" \
            --postgres-url="${{ steps.postgres-target.outputs.resolved_url }}" \
            --output=../../.tmp/release-cadence/cutover-apply.json

      - name: Verify governed cutover parity
        run: |
          npm run db:cutover:postgres -- --action=verify \
            --postgres-url="${{ steps.postgres-target.outputs.resolved_url }}" \
            --output=../../.tmp/release-cadence/cutover-verify.json

      - name: Run managed-profile incremental validation
        run: |
          npm run perf:postgres-managed -- --execute \
            --human-approval-ref="$HUMANONLY_APPROVAL_REF" \
            --postgres-url="${{ steps.postgres-target.outputs.resolved_url }}" \
            --simulated-latency-ms="$HUMANONLY_SIMULATED_LATENCY_MS" \
            --json-output=.tmp/release-cadence/perf-postgres-managed.json \
            --markdown-output=docs/SPRINT_6_MANAGED_POSTGRES_INCREMENTAL_VALIDATION.md

      - name: Generate release evidence bundle template
        run: |
          npm run release:evidence:bundle -- --run-id="${{ github.run_id }}" \
            --run-url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --executed-at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --target-profile="$HUMANONLY_RELEASE_TARGET_PROFILE" \
            --approval-ref="$HUMANONLY_APPROVAL_REF" \
            --managed-postgres-url="${{ steps.postgres-target.outputs.resolved_url }}" \
            --managed-postgres-source="${{ steps.postgres-target.outputs.resolved_source }}" \
            --cutover-plan-json=.tmp/release-cadence/cutover-plan.json \
            --cutover-apply-json=.tmp/release-cadence/cutover-apply.json \
            --cutover-verify-json=.tmp/release-cadence/cutover-verify.json \
            --perf-json=.tmp/release-cadence/perf-postgres-managed.json \
            --output=docs/SPRINT_7_RELEASE_EVIDENCE_BUNDLE.md \
            --output-json=docs/SPRINT_7_RELEASE_EVIDENCE_BUNDLE.json

      - name: Upload governance evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-governance-cadence-${{ github.run_id }}
          path: |
            .tmp/release-cadence/*.json
            docs/SPRINT_6_MANAGED_POSTGRES_INCREMENTAL_VALIDATION.md
            docs/SPRINT_7_RELEASE_EVIDENCE_BUNDLE.md
            docs/SPRINT_7_RELEASE_EVIDENCE_BUNDLE.json
